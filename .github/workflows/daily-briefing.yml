name: Daily Briefing (sunset)

# SUNSET 2026-05-04 — the daily briefing now ships from `scmaine-helm`
# (Railway, in-process scheduler at 04:30 America/New_York). This
# project is archived; the schedule trigger is removed so it never
# fires again. workflow_dispatch is retained only so an operator can
# manually confirm the workflow really is dormant.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sunset-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Project sunset
        run: |
          echo "::warning::str-daily-briefing is sunset as of 2026-05-04."
          echo "The daily briefing now runs from scmaine-helm:"
          echo "  https://github.com/PMTinkerer/scmaine-helm"
          echo "  https://helm-production-2afa.up.railway.app"
          echo "Nothing was sent."
